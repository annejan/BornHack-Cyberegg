
[build]
# Default to host build (simulator). Override with --target for embedded.
target = "x86_64-unknown-linux-gnu"

[target.thumbv7em-none-eabihf]
runner = "probe-rs run --chip nRF52840_xxAA"
# flip-link relocates the stack to the bottom of RAM so a stack overflow faults
# immediately instead of silently corrupting statics. The mesh build's SDC
# handshake peaks close to the stack budget; this is the fleet-wide guard.
linker = "flip-link"
# rustflags = ["-C", "link-arg=-Tlink.x", "-C", "link-arg=-Tdefmt.x"]

[env]
DEFMT_LOG = "info,bornhack_aegg::fw::kv=warn,bornhack_aegg::fw::bonds=warn,bornhack_aegg::fw::battery=off,bornhack_aegg::fw::mesh::meshcore=warn,trouble_host=info,nrf_mpsl=warn,nrf_sdc=info"
# BLE packet pool. Was bumped to 64 (× 251 B ≈ 15.7 KiB) as an OOM diagnostic;
# that inflation left only ~36 KiB for the stack, and the SDC handshake peak
# overflowed it (silent RAM corruption, caught via flip-link). 32 buffers
# (≈ 7.8 KiB) frees ~8 KiB of stack headroom — watch for OOM/pool-exhaustion.
TROUBLE_HOST_DEFAULT_PACKET_POOL_SIZE = "32"

[alias]
sim = "run --bin simulator --features simulator"
fw = "build --bin embassy --no-default-features --features embassy --target thumbv7em-none-eabihf"
fw-flash = "run --bin embassy --no-default-features --features embassy --target thumbv7em-none-eabihf"
fw-release = "build --bin embassy --no-default-features --features embassy --target thumbv7em-none-eabihf --release"
fw-release-debug = "build --bin embassy --no-default-features --features embassy --target thumbv7em-none-eabihf --profile release-debug"
fw-game = "build --bin embassy --no-default-features --features embassy-game --target thumbv7em-none-eabihf"
fw-game-release = "build --bin embassy --no-default-features --features embassy-game --target thumbv7em-none-eabihf --release"
fw-mesh = "build --bin embassy --no-default-features --features embassy-mesh --target thumbv7em-none-eabihf"
fw-mesh-release = "build --bin embassy --no-default-features --features embassy-mesh --target thumbv7em-none-eabihf --release"
fw-hwtest = "build --bin hwtest --no-default-features --features hwtest --target thumbv7em-none-eabihf --profile release-hwtest"
fw-watch = "build --bin embassy --no-default-features --features embassy-watch --target thumbv7em-none-eabihf"
fw-watch-release = "build --bin embassy --no-default-features --features embassy-watch --target thumbv7em-none-eabihf --release"
